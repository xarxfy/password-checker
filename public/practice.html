<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwörter üben</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    nav {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    nav a, nav button {
      text-decoration: none;
      color: #555;
      font-size: .9rem;
      padding: .35rem .75rem;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: none;
      cursor: pointer;
      font-family: inherit;
    }
    nav a.active, nav a:hover {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    nav button:hover { background: #f3f4f6; }
    nav .spacer { flex: 1; }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .field {
      margin-bottom: 1rem;
    }
    label {
      font-size: .85rem;
      color: #444;
      display: block;
      margin-bottom: .3rem;
    }

    select,
    input[type="password"] {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: #fff;
      transition: border-color .15s;
    }
    select:focus, input:focus { border-color: #2563eb; }

    .btn {
      padding: .65rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: opacity .15s;
      width: 100%;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #2563eb; color: #fff; }

    #result {
      margin-top: 1.25rem;
      padding: .9rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      display: none;
    }
    #result.correct {
      background: #dcfce7;
      color: #15803d;
      display: block;
    }
    #result.wrong {
      background: #fee2e2;
      color: #b91c1c;
      display: block;
    }

    .empty-hint {
      color: #999;
      font-size: .9rem;
      margin-top: .5rem;
    }

    .attempt-count {
      font-size: .8rem;
      color: #888;
      margin-top: .5rem;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="card">
  <nav>
    <a href="/manage">Verwalten</a>
    <a href="/practice" class="active">Üben</a>
    <span class="spacer"></span>
    <button id="logout-btn">Logout</button>
  </nav>

  <h1>Passwort üben</h1>

  <div id="app">
    <p class="empty-hint">Lade …</p>
  </div>
</div>

<script>
  const app = document.getElementById('app');

  async function init() {
    const res = await fetch('/api/passwords');
    const passwords = await res.json();

    if (passwords.length === 0) {
      app.innerHTML = '<p class="empty-hint">Noch keine Passwörter gespeichert. <a href="/manage">Jetzt anlegen →</a></p>';
      return;
    }

    app.innerHTML = `
      <div class="field">
        <label for="select">Passwort auswählen</label>
        <select id="select"></select>
      </div>
      <div class="field">
        <label for="attempt">Passwort eingeben</label>
        <input type="password" id="attempt" placeholder="Passwort tippen …" autocomplete="off">
      </div>
      <p class="attempt-count" id="attempt-count"></p>
      <button class="btn btn-primary" id="check-btn">Prüfen</button>
      <div id="result"></div>
    `;

    const select = document.getElementById('select');
    for (const pw of passwords) {
      const opt = document.createElement('option');
      opt.value = pw.id;
      opt.textContent = pw.name;
      select.appendChild(opt);
    }

    let tries = 0;
    const attemptInput = document.getElementById('attempt');
    const result = document.getElementById('result');
    const countEl = document.getElementById('attempt-count');

    // Reset counter when password selection changes
    select.addEventListener('change', () => {
      tries = 0;
      countEl.textContent = '';
      result.className = '';
      result.textContent = '';
      attemptInput.value = '';
      attemptInput.focus();
    });

    async function check() {
      const id = select.value;
      const attempt = attemptInput.value;
      if (!attempt) return;

      const res = await fetch(`/api/passwords/${id}/check`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ attempt }),
      });
      const data = await res.json();
      tries++;

      if (data.correct) {
        result.className = 'correct';
        result.textContent = `Richtig! (${tries} ${tries === 1 ? 'Versuch' : 'Versuche'})`;
        attemptInput.value = '';
        tries = 0;
        countEl.textContent = '';
      } else {
        result.className = 'wrong';
        result.textContent = 'Falsch, nochmal versuchen.';
        attemptInput.value = '';
        countEl.textContent = `Versuche: ${tries}`;
      }
      attemptInput.focus();
    }

    document.getElementById('check-btn').addEventListener('click', check);
    attemptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') check();
    });

    attemptInput.focus();
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });

  init();
</script>
</body>
</html>
